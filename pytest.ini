[pytest]
# Only collect from ./tests so stray trees (e.g. tmp/) never enter collection.
testpaths = tests
norecursedirs = tmp .* build dist node_modules venv .venv __pycache__ *.egg

markers =
    openai: exercises cloud LLM routes (requires a valid API key in the environment).
    slow: may download embedding models or run longer Ollama probes.
    e2e: live HTTP tests against APP_BASE; requires RUN_E2E=1 and a running app.
